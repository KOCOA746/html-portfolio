<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Portal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f3;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #686f78;
      --line: #deded7;
      --accent: #256f62;
      --accent-strong: #17483f;
      --shadow: 0 18px 50px rgba(32, 33, 36, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 720px;
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .counter {
      flex: 0 0 auto;
      min-width: 112px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-align: right;
    }

    .counter strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
    }

    .counter span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
    }

    .search {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font-size: 1rem;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 111, 98, 0.16);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .item {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .item:hover,
    .item:focus-visible {
      border-color: var(--accent);
      transform: translateY(-2px);
      outline: none;
    }

    .name {
      overflow-wrap: anywhere;
      font-weight: 700;
      font-size: 1.08rem;
      line-height: 1.35;
    }

    .path {
      margin-top: 20px;
      overflow-wrap: anywhere;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .empty {
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 680px) {
      .shell {
        width: min(100% - 24px, 1120px);
        padding-top: 28px;
      }

      header {
        display: block;
      }

      .counter {
        width: 100%;
        margin-top: 18px;
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>HTML Portal</h1>
        <p class="subtitle">A simple first page that links to every HTML page in this repository.</p>
      </div>
      <div class="counter" aria-label="Page count">
        <strong id="count">0</strong>
        <span>pages</span>
      </div>
    </header>

    <div class="toolbar">
      <input id="search" class="search" type="search" placeholder="Search by page name or path" autocomplete="off">
    </div>

    <section id="list" class="grid" aria-live="polite"></section>
  </main>

  <script>
    const list = document.querySelector("#list");
    const count = document.querySelector("#count");
    const search = document.querySelector("#search");
    let pages = [];

    const formatName = (path) => {
      const filename = path.split("/").pop().replace(/\.html?$/i, "");
      return filename
        .replace(/[-_]+/g, " ")
        .replace(/\b\w/g, (letter) => letter.toUpperCase());
    };

    const render = () => {
      const keyword = search.value.trim().toLowerCase();
      const filtered = pages.filter((page) => {
        const target = `${page.title} ${page.path}`.toLowerCase();
        return target.includes(keyword);
      });

      count.textContent = filtered.length;

      if (!filtered.length) {
        list.className = "empty";
        list.textContent = pages.length
          ? "No matching pages."
          : "No HTML pages are listed yet. Generate or update html-manifest.json.";
        return;
      }

      list.className = "grid";
      list.innerHTML = filtered.map((page) => `
        <a class="item" href="${page.path}">
          <span class="name">${page.title}</span>
          <span class="path">${page.path}</span>
        </a>
      `).join("");
    };

    const loadPages = async () => {
      try {
        const response = await fetch("html-manifest.json", { cache: "no-store" });
        if (!response.ok) throw new Error("manifest not found");
        const data = await response.json();
        pages = data.pages
          .filter((page) => page.path && !/^index\.html?$/i.test(page.path))
          .map((page) => ({
            path: page.path,
            title: page.title || formatName(page.path)
          }))
          .sort((a, b) => a.title.localeCompare(b.title, "ko"));
      } catch (error) {
        pages = [];
      }

      render();
    };

    search.addEventListener("input", render);
    loadPages();
  </script>
</body>
</html>
